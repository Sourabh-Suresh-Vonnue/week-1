<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task 4 - Image Gallery</title>
  </head>
  <body>
    <header>
      <h1>Gallery</h1>
    </header>
    <main>
      <section>
        <h2>View</h2>
        <figure>
          <img src="./assests/view.jpg" alt="aerial view of" />
          <figcaption>
            Fig 1.1 - aerial view of land with trees and river
          </figcaption>
        </figure>
        <figure>
          <img src="./assests/view2.jpg" alt="moutain view" />
          <figcaption>Fig 1.2 - view of moutain near field</figcaption>
        </figure>
        <figure>
          <img src="./assests/view3.jpg" alt="river" />
          <figcaption>Fig 1.3 - view river near moutain</figcaption>
        </figure>
        <figure>
          <img src="./assests/view4.jpg" alt="hill road" />
          <figcaption>Fig 1.4 - hill road view</figcaption>
        </figure>
        <figure>
          <img src="./assests/view5.jpg" alt="view from plane" />
          <figcaption>Fig 1.5 - view of land from plane</figcaption>
        </figure>
      </section>
      <section>
        <h2>Nature</h2>
        <figure>
          <img src="./assests/rocks.jpg" alt="rocks" />
          <figcaption>Fig 2.1 - light falling on rocks</figcaption>
        </figure>
        <figure>
          <img src="./assests/rock-in-water.jpg" alt="pebbels" />
          <figcaption>Fig 2.2 - crystal view of pebbels in water</figcaption>
        </figure>
        <figure>
          <img src="./assests/seashore.jpg" alt="seashore" />
          <figcaption>Fig 2.3 - seashore rocks</figcaption>
        </figure>
        <figure>
          <img src="./assests/waterfall.jpg" alt="waterfall" />
          <figcaption>Fig 2.4 - man enjoying the waterfall</figcaption>
        </figure>
        <figure>
          <img src="./assests/dessert.jpg" alt="dessert" />
          <figcaption>Fig 2.5 - empty dessert</figcaption>
        </figure>
        <figure>
          <img src="./assests/forest-river.jpg" alt="forest river" />
          <figcaption>Fig 2.6 - image of forest river</figcaption>
        </figure>
      </section>
      <section>
        <h2>Man made</h2>
        <figure>
          <img src="./assests/camera.jpg" alt="camera" />
          <figcaption>Fig 3.1 - cameras and lenses</figcaption>
        </figure>
        <figure>
          <img src="./assests/boat.jpg" alt="boat" />
          <figcaption>Fig 3.2 - boat in the river</figcaption>
        </figure>
        <figure>
          <img src="./assests/car.jpg" alt="car" />
          <figcaption>Fig 3.3 - car</figcaption>
        </figure>
        <figure>
          <img src="./assests/laptop.jpg" alt="laptop" />
          <figcaption>Fig 3.4 - laptop on a table</figcaption>
        </figure>
      </section>
      <!-- Below images are for decorative only. therefor need of alt. then screen reader will ignore the image. -->
      <img src="./assests/abstract.jpg" alt="" />
      <img src="./assests/bear.jpg" alt="" />
    </main>
  </body>
</html>
