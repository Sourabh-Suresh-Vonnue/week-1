<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D3T3 - Native HTML Validation</title>
  </head>
  <body>
    <main>
      <h1>Validation</h1>
      <form>
        <label for="email">Email: </label>
        <input type="email" name="email" id="email" required /> <br /><br />
        <label for="password">Password: </label>
        <input
          type="password"
          name="password"
          id="password"
          minlength="8"
          pattern=".*[0-9].*"
          title="should contain atleast one number and should be minimum of 8 characters"
          required
        />
        <br /><br />
        <label for="age">Age: </label>
        <input type="number" name="age" id="age" min="18" max="99" /> <br /><br />
        <label for="website">Website URL: </label>
        <input type="url" name="website" id="website" /> <br /><br />
        <label for="dob">Date Of Birth: </label>
        <input type="date" name="dob" id="dob" max="2026-06-08" /> <br /><br />
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
