<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D4T4 - Media</title>
  </head>
  <body>
    <main>
      <video controls width="640" poster="https://picsum.photos/650/350?random=N">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />

        <track kind="captions" src="assets/caption.vtt" srclang="en" label="English" />

        <p>Your Browser does not support mp4 video format.</p>
      </video>
      <details>
        <summary>Video Summary:</summary>
        <p>A bunny looking at a butterfly.</p>
        <p>Butterfly sits on a flower.</p>
        <p>Suddenly somthing falls on the butterfly.</p>
      </details>
      <br />
      <audio controls>
        <source
          src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
          type="audio/mp3"
        />
        <source
          src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
          type="audio/ogg"
        />
        <p>
          Your Browser does not support mp4 video format. click this
          <a href="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">link</a> for the
          audio
        </p>
      </audio>
      <details>
        <summary>Audio Summary:</summary>
        <p>Sound of Alarm Clock.</p>
      </details>
    </main>
  </body>
</html>
